<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typero - Login</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://typero.app/login">
  <link rel="apple-touch-icon" href="/about-hero.png">
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <script src="/js/fs-restore.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo"><a href="/"><span class="logo-mark"></span> TYPERO</a></div>
      <a href="/">Typing Home</a>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Login</h3>
        <label>Username</label>
        <input id="loginUser" />
        <label style="margin-top:10px">Password</label>
        <input id="loginPass" type="password" />
        <button id="loginBtn" style="margin-top:12px">Login</button>
      </div>

      <div class="card">
        <h3>Register</h3>
        <label>Username</label>
        <input id="regUser" />
        <label style="margin-top:10px">Password</label>
        <input id="regPass" type="password" />
        <button id="regBtn" style="margin-top:12px">Create Account</button>
      </div>
    </div>

    <p id="authMsg" class="small"></p>
  </div>
  <footer class="footer"><a href="https://soluto.in" target="_blank">Powered by Soluto</a></footer>

  <script type="module" src="/js/login.js"></script>
</body>
</html>
